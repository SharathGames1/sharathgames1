name: Build Vaultwarden
on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"
jobs:
  build:
    runs-on: windows-latest
    steps:
        - name: Clone Github Repo
          run: |
            git clone --depth 1 https://github.com/dani-garcia/vaultwarden
        - name: setup mysql, openssl
          run: |
                winget install Oracle.MySQL --silent --accept-package-agreements  --accept-source-agreements
                winget install ShiningLight.OpenSSL.Dev --silent --accept-package-agreements --accept-source-agreements
        - name: build
          env:
            OPENSSL_DIR: CC:\Program Files\OpenSSL-Win64
          run: |
           cd vaultwarden
           cargo build --release --features sqlite,mysql
        - name: Upload a Build Artifact
          uses: actions/upload-artifact@v4
          with:
            path: vaultwarden/target/release




            
